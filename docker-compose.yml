services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - 27017:27017
    volumes:
      - mongo:/data/db 
    environment:
      -  MONGO_INITDB_ROOT_USERNAME=root
      -  MONGO_INITDB_ROOT_PASSWORD=root
    restart: always

  mongo-express: 
    image: mongo-express
    container_name: mongo-express
    ports:
      - 8081:8081
    depends_on: 
      - mongodb
    environment: 
      - ME_CONFIG_MONGODB_URL=mongodb://root:root@mongodb:27017/?authSource=admin
    restart: always
    
volumes:
  mongo: 

# For Login in Mongo DB username ==> (admin) | password ==> (pass)